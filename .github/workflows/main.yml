name: Build iOS IPA

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development
  workflow_dispatch:

jobs:
  build-ios:
    name: Build AniKatou IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Make build script executable
        run: chmod +x ./ipabuild.sh

      - name: Build IPA
        run: ./ipabuild.sh

      - name: Verify IPA output
        run: |
          test -f build/AniKatou.ipa
          ls -lah build

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AniKatou-iOS-Build
          path: build/AniKatou.ipa
          retention-days: 30
